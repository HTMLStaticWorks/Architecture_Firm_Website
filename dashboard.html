<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | Arkigreen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <script id="projects-json" type="application/json">
{
    "projects": [
        {
            "id": "PRJ-001",
            "projectName": "The Solaris Estate",
            "status": "In Progress",
            "phase": "Structural Integration",
            "completionPercent": 65,
            "projectManager": "Sarah Jenkins",
            "materials": [
                { "name": "Recycled Slate Tile", "supplier": "StoneCraft UK", "status": "Approved", "image": "https://images.unsplash.com/photo-1516156008625-3a9d6067fab5?w=200" },
                { "name": "Bismuth Glass Paneling", "supplier": "ClearPath Tech", "status": "Pending", "image": "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=200" },
                { "name": "Carbon-Negative Concrete", "supplier": "TerraForm", "status": "Revision", "image": "https://images.unsplash.com/photo-1517581177682-a085bb7ffb15?w=200" }
            ],
            "timelineEvents": [
                { "title": "Groundbreaking", "start": "2026-01-15", "className": "event-milestone" },
                { "title": "Foundation Pour", "start": "2026-02-20", "end": "2026-02-28", "className": "event-phase" },
                { "title": "Structural Framing", "start": "2026-03-10", "end": "2026-04-15", "className": "event-active" }
            ],
            "sustainabilityScores": {
                "leedScore": 82,
                "carbonOffset": 450,
                "energyEfficiency": 94
            },
            "messages": [
                { "sender": "Sarah Jenkins", "text": "The solar array shipment is on track for Tuesday.", "timestamp": "10:45 AM", "side": "left" },
                { "sender": "Client", "text": "Excellent. Have we confirmed the window tinting specs?", "timestamp": "11:20 AM", "side": "right" }
            ]
        }
    ]
}
</script>
</head>

<body>
    <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;">
    </div>

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header" style="display:flex;align-items:center;justify-content:space-between;">
                <a href="index.html" style="text-decoration:none;line-height:0;" class="sidebar-logo-link">
                    <img src="assets/images/logo.svg" alt="Arkigreen Logo"
                        style="height: 30px; width: auto; display: block;">
                </a>
                <button id="close-sidebar" class="theme-btn" style="padding:8px;display:none;"
                    aria-label="Close sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-link" data-section="materials">
                    <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8">
                            <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2" />
                        </svg></span>
                    <span class="sidebar-text">Materials</span>
                </a>
                <a href="#" class="sidebar-link" data-section="timeline">
                    <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8">
                            <rect x="3" y="4" width="18" height="18" rx="2" />
                            <line x1="16" y1="2" x2="16" y2="6" />
                            <line x1="8" y1="2" x2="8" y2="6" />
                            <line x1="3" y1="10" x2="21" y2="10" />
                        </svg></span>
                    <span class="sidebar-text">Timeline</span>
                </a>
                <a href="#" class="sidebar-link" data-section="sustainability">
                    <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8">
                            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
                            <path d="M7 12s1-4 5-4 5 4 5 4-1 4-5 4-5-4-5-4z" />
                        </svg></span>
                    <span class="sidebar-text">Sustainability</span>
                </a>
                <a href="#" class="sidebar-link" data-section="messages">
                    <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg></span>
                    <span class="sidebar-text">Messages</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="sidebar-link sidebar-logout">
                    <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg></span>
                    <span class="sidebar-text">Log Out</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <header class="top-bar">
                <div style="display:flex;align-items:center;gap:20px;">
                    <button id="toggle-sidebar" class="theme-btn" style="padding:10px;" aria-label="Toggle sidebar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg>
                    </button>
                </div>
                <div style="display:flex;align-items:center;gap:16px;">
                    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme" title="Toggle theme">
                        <span class="toggle-track">
                            <span class="toggle-thumb"></span>
                            <span class="toggle-icon toggle-icon-dark">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
                                </svg>
                            </span>
                            <span class="toggle-icon toggle-icon-light">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                                    <circle cx="12" cy="12" r="5" />
                                    <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" />
                                    <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" />
                                    <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" />
                                    <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" />
                                </svg>
                            </span>
                        </span>
                    </button>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <span id="client-name" style="font-size:0.9rem;font-weight:500;">Client</span>
                        <div
                            style="width:40px;height:40px;background:var(--color-green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;color:#fff;font-size:1.1rem;">
                            PC</div>
                    </div>
                </div>
            </header>

            <div class="content-body" id="dashboard-content">

                <!-- Module: Materials -->
                <div class="module-card col-12" id="mod-materials" data-anchor="materials">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                        <h3 style="margin:0;">Materials</h3>
                        <span style="font-size:0.8rem;color:var(--color-text-muted);">The Solaris Estate</span>
                    </div>
                    <div style="overflow-x:auto;">
                        <table style="width:100%;border-collapse:collapse;font-size:0.875rem;">
                            <thead>
                                <tr style="border-bottom:2px solid var(--color-border);">
                                    <th
                                        style="text-align:left;padding:10px 16px;color:var(--color-text-muted);font-weight:500;font-family:'DM Sans',sans-serif;font-size:0.78rem;letter-spacing:0.05em;text-transform:uppercase;">
                                        Material</th>
                                    <th
                                        style="text-align:left;padding:10px 16px;color:var(--color-text-muted);font-weight:500;font-family:'DM Sans',sans-serif;font-size:0.78rem;letter-spacing:0.05em;text-transform:uppercase;">
                                        Supplier</th>

                                    <th
                                        style="text-align:left;padding:10px 16px;color:var(--color-text-muted);font-weight:500;font-family:'DM Sans',sans-serif;font-size:0.78rem;letter-spacing:0.05em;text-transform:uppercase;">
                                        Status</th>
                                </tr>
                            </thead>
                            <tbody id="materials-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Module: Timeline -->
                <div class="module-card col-4" id="mod-timeline" data-anchor="timeline">
                    <h3>Construction Timeline</h3>
                    <div id="calendar"></div>
                </div>

                <!-- Module: Sustainability -->
                <div class="module-card col-4" id="mod-sustainability" data-anchor="sustainability">
                    <h3>Sustainability Metrics</h3>
                    <canvas id="leedChart" height="200"></canvas>
                    <div id="sustainability-stats" style="display:flex;gap:1rem;margin-top:1rem;font-size:0.8rem;">
                    </div>
                </div>

                <!-- Module: Messaging -->
                <div class="module-card col-4" id="mod-messages" data-anchor="messages">
                    <h3>Project Messaging</h3>
                    <div class="chat-container" id="chat-thread"></div>
                    <div style="display:flex;gap:10px;margin-top:15px;">
                        <input type="text" id="msg-input" class="form-input" style="flex:1;"
                            placeholder="Type a message..." aria-label="Message input">
                        <button class="btn btn-primary" style="padding:10px 16px;" onclick="sendMessage()">Send</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>

        document.addEventListener('DOMContentLoaded', () => {
            initDashboard();
        });

        function initDashboard() {
            let data;
            try {
                const jsonEl = document.getElementById('projects-json');
                if (!jsonEl) throw new Error('Data missing');
                data = JSON.parse(jsonEl.textContent);
            } catch (e) {
                document.getElementById('dashboard-content').innerHTML =
                    '<p style="color:var(--color-text-muted);padding:2rem;">Unable to load project data.</p>';
                return;
            }

            const project = data.projects[0];
            populateSelector(data.projects);
            renderOverview(project);
            renderMaterials(project.materials);
            renderTimeline(project.timelineEvents);
            renderCharts(project.sustainabilityScores);
            renderMessages(project.messages);
            initSidebarToggle();
            initSidebarLinks();
            initTheme();
        }

        function initTheme() {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-mode');
            }
        }

        // Theme toggle click handler
        document.getElementById('theme-toggle')?.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        });

        document.getElementById('theme-toggle-mobile')?.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        });
        function populateSelector(projects) {
            const sel = document.getElementById('project-selector');
            if (!sel) return;
            projects.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.projectName;
                sel.appendChild(opt);
            });
        }

        function renderOverview(project) {
            const el = document.getElementById('overview-content');
            if (!el) return;
            const statusClass = project.status === 'In Progress' ? 'status-in-progress' : 'status-on-hold';
            el.innerHTML = `
                <div style="margin-bottom:20px;">
                    <p class="text-muted" style="font-size:0.8rem;margin-bottom:6px;">Status</p>
                    <span class="status-badge ${statusClass}">${project.status}</span>
                </div>
                <div style="margin-bottom:20px;">
                    <p class="text-muted" style="font-size:0.8rem;margin-bottom:6px;">Phase: <strong style="color:var(--color-text);">${project.phase}</strong></p>
                    <div class="progress-bar"><div class="progress-fill" style="width:${project.completionPercent}%"></div></div>
                    <p style="text-align:right;font-size:0.8rem;margin-top:5px;">${project.completionPercent}% Complete</p>
                </div>
                <div>
                    <p class="text-muted" style="font-size:0.8rem;margin-bottom:6px;">Project Manager</p>
                    <p style="font-weight:500;">${project.projectManager}</p>
                    <button class="btn btn-outline" style="width:100%;margin-top:12px;padding:8px;">Contact PM</button>
                </div>`;
        }

        function renderMaterials(materials) {
            const tbody = document.getElementById('materials-table-body');
            if (!tbody) return;
            tbody.innerHTML = materials.map((m, i) => {
                const statusColor = m.status === 'Approved' ? '#3b6b52' : m.status === 'Pending' ? 'var(--color-brass)' : '#8c4a4a';
                const statusBg = m.status === 'Approved' ? 'rgba(59,107,82,0.15)' : m.status === 'Pending' ? 'rgba(184,151,90,0.15)' : 'rgba(140,74,74,0.15)';
                const rowBg = i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)';
                return `<tr style="border-bottom:1px solid var(--color-border);background:${rowBg};transition:background 0.2s;"
                    onmouseover="this.style.background='rgba(59,107,82,0.06)'"
                    onmouseout="this.style.background='${rowBg}'">
                    <td style="padding:14px 16px;font-weight:500;color:var(--color-text);">${m.name}</td>
                    <td style="padding:14px 16px;color:var(--color-text-muted);">${m.supplier}</td>
                   
                    <td style="padding:14px 16px;">
                        <span style="padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;background:${statusBg};color:${statusColor};">${m.status}</span>
                    </td>
                </tr>`;
            }).join('');
        }

        function renderTimeline(events) {
            const el = document.getElementById('calendar');
            if (!el || typeof FullCalendar === 'undefined') return;
            new FullCalendar.Calendar(el, {
                initialView: 'dayGridMonth',
                events: events,
                height: 320,
                headerToolbar: { left: 'prev', center: 'title', right: 'next,listMonth' }
            }).render();
        }

        function renderCharts(scores) {
            const canvas = document.getElementById('leedChart');
            if (!canvas || typeof Chart === 'undefined') return;
            new Chart(canvas.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['LEED Score', 'Remaining'],
                    datasets: [{ data: [scores.leedScore, 100 - scores.leedScore], backgroundColor: ['#3b6b52', '#2a3d33'], borderWidth: 0 }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } } }
            });

            const stats = document.getElementById('sustainability-stats');
            if (stats) {
                stats.innerHTML = `
                    <div style="flex:1;text-align:center;padding:8px;background:var(--color-primary);border-radius:6px;">
                        <p style="font-size:1.2rem;font-weight:600;color:var(--color-green);">${scores.leedScore}</p>
                        <p class="text-muted" style="font-size:0.7rem;">LEED Score</p>
                    </div>
                    <div style="flex:1;text-align:center;padding:8px;background:var(--color-primary);border-radius:6px;">
                        <p style="font-size:1.2rem;font-weight:600;color:var(--color-brass);">${scores.carbonOffset}t</p>
                        <p class="text-muted" style="font-size:0.7rem;">CO₂ Offset</p>
                    </div>
                    <div style="flex:1;text-align:center;padding:8px;background:var(--color-primary);border-radius:6px;">
                        <p style="font-size:1.2rem;font-weight:600;color:var(--color-text);">${scores.energyEfficiency}%</p>
                        <p class="text-muted" style="font-size:0.7rem;">Energy Eff.</p>
                    </div>`;
            }
        }
        function renderMessages(msgs) {
            const el = document.getElementById('chat-thread');
            if (!el) return;
            el.innerHTML = msgs.map(m => `
                <div class="msg ${m.side}">
                    <p style="font-size:0.75rem;opacity:0.6;margin-bottom:4px;">${m.sender}</p>
                    <p>${m.text}</p>
                    <span style="font-size:0.7rem;opacity:0.5;margin-top:5px;display:block;">${m.timestamp}</span>
                </div>`).join('');
            el.scrollTop = el.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const thread = document.getElementById('chat-thread');
            if (!input || !input.value.trim()) return;
            const div = document.createElement('div');
            div.className = 'msg right';
            div.innerHTML = `<p>${input.value}</p><span style="font-size:0.7rem;opacity:0.5;margin-top:5px;display:block;">Just now</span>`;
            thread.appendChild(div);
            thread.scrollTop = thread.scrollHeight;
            input.value = '';
        }

        function initSidebarToggle() {
            const btn = document.getElementById('toggle-sidebar');
            const closeBtn = document.getElementById('close-sidebar');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (!btn || !sidebar) return;

            function openSidebar() {
                sidebar.classList.add('active');
                overlay.style.display = 'block';
                closeBtn.style.display = 'flex';
            }

            function closeSidebar() {
                sidebar.classList.remove('active');
                sidebar.classList.remove('collapsed');
                overlay.style.display = 'none';
                closeBtn.style.display = 'none';
            }

            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (sidebar.classList.contains('active')) {
                    closeSidebar();
                } else {
                    openSidebar();
                }
            });

            closeBtn?.addEventListener('click', closeSidebar);
            overlay?.addEventListener('click', closeSidebar);
        }
        function initSidebarLinks() {
            const links = document.querySelectorAll('.sidebar-link[data-section]');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const closeBtn = document.getElementById('close-sidebar');

            links.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    // highlight active
                    links.forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    // scroll to section
                    const target = document.querySelector(`[data-anchor="${link.dataset.section}"]`);
                    if (target) {
                        const offset = target.getBoundingClientRect().top + window.scrollY - 100;
                        window.scrollTo({ top: offset, behavior: 'smooth' });
                    }
                    // close sidebar on mobile
                    if (sidebar.classList.contains('active')) {
                        sidebar.classList.remove('active');
                        overlay.style.display = 'none';
                        if (closeBtn) closeBtn.style.display = 'none';
                    }
                });
            });
        }
    </script>
    <button id="scroll-to-top" aria-label="Scroll to top">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 15l-6-6-6 6" />
        </svg>
    </button>
</body>

</html>
