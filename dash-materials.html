<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materials | Arkigreen Client Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>

<body>
    <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;">
    </div>
    <div class="dashboard-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header" style="display:flex;align-items:center;justify-content:space-between;">
                <a href="index.html" style="text-decoration:none;line-height:0;"><img src="assets/images/logo.svg"
                        alt="Arkigreen" style="height:30px;width:auto;display:block;"></a>
                <button id="rtl-toggle-mobile" class="theme-btn rtl-toggle" aria-label="Toggle RTL" style="padding:8px; font-weight: 600; font-family: 'DM Sans', sans-serif; font-size: 14px; margin-right: 8px;">RTL</button>
                <button id="close-sidebar" class="theme-btn" style="padding:8px;display:none;" aria-label="Close"><svg
                        width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg></button>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link">
                    <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                        </svg></span>
                    <span class="sidebar-text">Overview</span>
                </a>
                <a href="dash-materials.html" class="sidebar-link active">
                    <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8">
                            <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2" />
                        </svg></span>
                    <span class="sidebar-text">Materials</span>
                </a>
                <a href="dash-timeline.html" class="sidebar-link">
                    <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8">
                            <rect x="3" y="4" width="18" height="18" rx="2" />
                            <line x1="16" y1="2" x2="16" y2="6" />
                            <line x1="8" y1="2" x2="8" y2="6" />
                            <line x1="3" y1="10" x2="21" y2="10" />
                        </svg></span>
                    <span class="sidebar-text">Timeline</span>
                </a>
                <a href="dash-sustainability.html" class="sidebar-link">
                    <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8">
                            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
                            <path d="M7 12s1-4 5-4 5 4 5 4-1 4-5 4-5-4-5-4z" />
                        </svg></span>
                    <span class="sidebar-text">Sustainability</span>
                </a>
                <a href="dash-messages.html" class="sidebar-link">
                    <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg></span>
                    <span class="sidebar-text">Messages</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="sidebar-link sidebar-logout">
                    <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg></span>
                    <span class="sidebar-text">Log Out</span>
                </a>
            </div>
        </aside>

        <main class="dashboard-main">
            <header class="top-bar">
                <div class="top-bar-left">
                    <button id="toggle-sidebar" class="theme-btn" style="padding:10px;" aria-label="Toggle sidebar"><svg
                            width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg></button>
                    <div class="top-bar-welcome">
                        <span>Welcome back</span>
                        <span>The Solaris Estate</span>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:16px;">
                    <button id="rtl-toggle" class="theme-btn rtl-toggle" aria-label="Toggle RTL" style="font-weight: 600; font-family: 'DM Sans', sans-serif; font-size: 14px;">RTL</button>
                    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
                        <span class="toggle-track"><span class="toggle-thumb"></span>
                            <span class="toggle-icon toggle-icon-dark"><svg width="12" height="12" viewBox="0 0 24 24"
                                    fill="currentColor">
                                    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
                                </svg></span>
                            <span class="toggle-icon toggle-icon-light"><svg width="12" height="12" viewBox="0 0 24 24"
                                    fill="currentColor">
                                    <circle cx="12" cy="12" r="5" />
                                    <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" />
                                    <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" />
                                    <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" />
                                    <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" />
                                </svg></span>
                        </span>
                    </button>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <span style="font-size:0.9rem;font-weight:500;color:var(--color-text-muted);">Client</span>
                        <div
                            style="width:40px;height:40px;background:var(--color-green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;color:#fff;font-size:1.1rem;">
                            PC</div>
                    </div>
                </div>
            </header>

            <div class="content-body">

                <!-- Materials Table -->
                <div class="module-card col-12">
                    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
                        <h2 style="margin:0;">Project Materials</h2>
                        <span style="font-size:0.82rem;color:var(--color-text-muted);">The Solaris Estate ·
                            PRJ-001</span>
                    </div>
                    <div style="overflow-x:auto;margin-top:8px;">
                        <table style="width:100%;border-collapse:collapse;font-size:0.875rem;">
                            <thead>
                                <tr style="border-bottom:2px solid var(--color-border);">
                                    <th
                                        style="text-align:left;padding:10px 16px;color:var(--color-text-muted);font-weight:500;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;">
                                        Material</th>
                                    <th
                                        style="text-align:left;padding:10px 16px;color:var(--color-text-muted);font-weight:500;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;">
                                        Supplier</th>
                                    <th
                                        style="text-align:left;padding:10px 16px;color:var(--color-text-muted);font-weight:500;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;">
                                        Status</th>
                                </tr>
                            </thead>
                            <tbody id="materials-tbody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Material Detail Cards -->

            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initSidebarToggle();
            
            // RTL Logic
            if (localStorage.getItem('rtl') === 'true') {
                document.documentElement.setAttribute('dir', 'rtl');
            }
            const toggleRTL = () => {
                const isRTL = document.documentElement.getAttribute('dir') === 'rtl';
                if (isRTL) {
                    document.documentElement.setAttribute('dir', 'ltr');
                    localStorage.setItem('rtl', 'false');
                } else {
                    document.documentElement.setAttribute('dir', 'rtl');
                    localStorage.setItem('rtl', 'true');
                }
            };
            document.getElementById('rtl-toggle')?.addEventListener('click', toggleRTL);
            document.getElementById('rtl-toggle-mobile')?.addEventListener('click', toggleRTL);
            document.getElementById('theme-toggle')?.addEventListener('click', () => {
                document.body.classList.toggle('light-mode');
                localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
            });
            renderTable(); renderCards();
        });

        function initTheme() {
            if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
        }

        function initSidebarToggle() {
            const btn = document.getElementById('toggle-sidebar');
            const closeBtn = document.getElementById('close-sidebar');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (!btn || !sidebar) return;
            function openSidebar() {
                sidebar.classList.add('active');
                if (overlay) overlay.style.display = 'block';
                if (closeBtn) closeBtn.style.display = 'flex';
            }
            function closeSidebar() {
                sidebar.classList.remove('active');
                if (overlay) overlay.style.display = 'none';
                if (closeBtn) closeBtn.style.display = 'none';
            }
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                sidebar.classList.contains('active') ? closeSidebar() : openSidebar();
            });
            if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
            if (overlay) overlay.addEventListener('click', closeSidebar);
        }

        const materials = [
            { name: "Recycled Slate Tile", supplier: "StoneCraft UK", status: "Approved", image: "https://images.unsplash.com/photo-1516156008625-3a9d6067fab5?w=400", note: "Sourced from post-industrial reclaimed slate. Zero deforestation impact." },
            { name: "Bismuth Glass Paneling", supplier: "ClearPath Tech", status: "Pending", image: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=400", note: "Awaiting final thermal performance certification from supplier." },
            { name: "Carbon-Negative Concrete", supplier: "TerraForm", status: "Revision", image: "https://images.unsplash.com/photo-1517581177682-a085bb7ffb15?w=400", note: "Mix ratio requires adjustment per LEED structural guidelines." }
        ];
        function renderTable() {
            const tbody = document.getElementById('materials-tbody');
            if (!tbody) return;
            tbody.innerHTML = materials.map((m, i) => {
                const sc = m.status === 'Approved' ? '#3b6b52' : m.status === 'Pending' ? 'var(--color-brass)' : '#c45c5c';
                const sb = m.status === 'Approved' ? 'rgba(59,107,82,0.15)' : m.status === 'Pending' ? 'rgba(184,151,90,0.15)' : 'rgba(196,92,92,0.15)';
                const rb = i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)';
                return `<tr style="border-bottom:1px solid var(--color-border);background:${rb};transition:background 0.2s;" onmouseover="this.style.background='rgba(59,107,82,0.06)'" onmouseout="this.style.background='${rb}'">
                    <td style="padding:14px 16px;font-weight:500;">${m.name}</td>
                    <td style="padding:14px 16px;color:var(--color-text-muted);">${m.supplier}</td>
                    <td style="padding:14px 16px;"><span style="padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;background:${sb};color:${sc};">${m.status}</span></td>
                </tr>`;
            }).join('');
        }
        function renderCards() {
            const el = document.getElementById('material-cards');
            if (!el) return;
            el.innerHTML = materials.map(m => {
                const sc = m.status === 'Approved' ? '#3b6b52' : m.status === 'Pending' ? 'var(--color-brass)' : '#c45c5c';
                const sb = m.status === 'Approved' ? 'rgba(59,107,82,0.15)' : m.status === 'Pending' ? 'rgba(184,151,90,0.15)' : 'rgba(196,92,92,0.15)';
                return `<div style="background:var(--color-primary);border:1px solid var(--color-border);border-radius:var(--radius-df);overflow:hidden;">
                    <img src="${m.image}" alt="${m.name}" style="width:100%;height:160px;object-fit:cover;display:block;">
                    <div style="padding:16px;">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;">
                            <p style="font-weight:600;font-size:0.9rem;">${m.name}</p>
                            <span style="padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;background:${sb};color:${sc};white-space:nowrap;">${m.status}</span>
                        </div>
                        <p style="font-size:0.8rem;color:var(--color-text-muted);margin-bottom:6px;">${m.supplier}</p>
                        <p style="font-size:0.8rem;color:var(--color-text-muted);line-height:1.5;">${m.note}</p>
                    </div>
                </div>`;
            }).join('');
        }

    </script>
    <button id="scroll-to-top" aria-label="Scroll to top"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M18 15l-6-6-6 6" />
        </svg></button>
</body>

</html>
