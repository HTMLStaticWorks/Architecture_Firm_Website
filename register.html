<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Arkigreen</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>

<body>
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <aside class="mobile-drawer" id="mobile-drawer">
        <div class="drawer-header">
            <a href="index.html" style="text-decoration:none;line-height:0;">
                <img src="assets/images/logo.svg" alt="Arkigreen Logo"
                    style="height: 40px; width: auto; display: block;">
            </a>
            <button class="theme-btn" id="close-drawer" aria-label="Close menu" style="padding:0;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
            </button>
        </div>
        <nav class="drawer-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="home2.html" class="nav-link">Home 2</a>
            <a href="services.html" class="nav-link">Services</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="blog.html" class="nav-link">Blog</a>
            <a href="contact.html" class="nav-link">Contact</a>
            <a href="dashboard.html" class="nav-link">Client Portal</a>
            <button class="theme-btn rtl-toggle" id="rtl-toggle-mobile" aria-label="Toggle RTL"
                style="align-self:center; font-weight: 600; font-family: 'DM Sans', sans-serif; font-size: 14px;">RTL</button>
            <button class="theme-btn" id="theme-toggle-mobile" aria-label="Toggle theme" style="align-self:center;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5" />
                    <path
                        d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2m-1.42-7.78l-1.42 1.42M5.64 18.36l-1.42 1.42" />
                </svg>
            </button>
        </nav>
        <a href="login.html" class="btn btn-primary">Login</a>
    </aside>


    <div class="auth-actions">
        <button class="theme-btn rtl-toggle" id="rtl-toggle" aria-label="Toggle RTL">RTL</button>
        <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5" />
                <path
                    d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2m-1.42-7.78l-1.42 1.42M5.64 18.36l-1.42 1.42" />
            </svg>
        </button>
    </div>

    <main class="auth-page">

        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html"
                    style="text-decoration:none;line-height:0;display:flex;justify-content:center;margin-bottom:1.5rem;">
                    <img src="assets/images/logo.svg" alt="Arkigreen Logo"
                        style="height: 60px; width: auto; display: block;">
                </a>
                <h3 class="display-font" style="font-size: 2.5rem; font-weight: bold;">Create Account</h3>

            </div>

            <form class="auth-form" id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I accept the <a href="#" style="color:var(--color-green);">Terms &
                            Conditions</a></label>
                </div>

                <button type="submit" class="btn btn-primary" id="register-submit">Register</button>
            </form>

            <div class="auth-divider">or</div>

            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <button class="btn btn-google">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt=""
                        style="width: 18px;">
                    Continue with Google
                </button>
                <button class="btn btn-google">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2" />
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                    </svg>
                    Continue with Email
                </button>
                <button class="btn btn-google">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                        fill="currentColor">
                        <path
                            d="M16.365 21.43c-1.127.485-2.288-.344-3.197-.811-1.054-.543-2.613-.674-3.951-.013-.88.435-2.215 1.554-3.473.805-2.698-1.602-5.46-6.666-4.22-10.457.72-2.203 2.502-3.834 4.542-3.834 1.765 0 2.946.855 4.316.855 1.455 0 2.9-.99 4.646-.99 2.05 0 3.754 1.096 4.7 2.65-4.27 2.15-3.411 7.744.912 9.208-.574 1.157-1.39 2.102-2.235 2.587h-.04zm-3.66-20.407c-1.385.17-2.926 1.054-3.8 2.12-.764.925-1.42 2.38-1.196 3.791 1.492.174 3.02-1.042 3.86-2.102.766-.967 1.346-2.422 1.136-3.809z" />
                    </svg>
                    Continue with Apple
                </button>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="login.html" style="color:var(--color-green);">Login</a>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const terms = document.getElementById('terms').checked;

            if (!terms) {
                alert('Please accept the Terms & Conditions');
                return;
            }

            if (password !== confirm) {
                alert('Passwords do not match');
                return;
            }

            // Simulate registration
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
